[variables]
NPM_CONFIG_PREFIX = "/app/.npm-global"
PATH = "/app/.npm-global/bin:/app/node_modules/.bin:$PATH"

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter './lib/**' -r build || true",
  "pnpm --filter @workspace/api-server build",
  "pnpm --filter @workspace/web build"
]

[start]
cmd = "NODE_ENV=production node artifacts/api-server/dist/index.mjs"
